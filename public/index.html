<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Air Hockey Pro MMR</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #auth { position: absolute; background: #222; padding: 30px; border-radius: 15px; border: 2px solid #444; text-align: center; z-index: 100; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 15px; width: 200px; }
        #ui { width: 800px; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card { background: #222; padding: 10px 20px; border-radius: 10px; text-align: center; min-width: 120px; border-bottom: 4px solid #444; }
        canvas { background: #fff; border: 4px solid #333; border-radius: 10px; cursor: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #msg { position: absolute; font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); z-index: 50; }
    </style>
</head>
<body>
    <div id="auth">
        <h2>AIR HOCKEY</h2>
        <input type="text" id="nick" placeholder="Ваш ник" maxlength="10"><br>
        <button onclick="start()" style="padding: 10px 25px; cursor: pointer;">ИГРАТЬ</button>
    </div>
    <div id="ui">
        <div class="card" style="border-color: #4444ff"><div id="n1">?</div><div id="s1" style="font-size: 32px; color: #4444ff">0</div><div id="r1" style="color: gold; font-size: 12px"></div></div>
        <div style="align-self: center; color: #555;">BATTLE TO 11</div>
		<div id="ping" style="color: #00ff00; font-size: 12px; font-family: monospace;">Ping: ...ms</div>
        <div class="card" style="border-color: #ff4444"><div id="n2">?</div><div id="s2" style="font-size: 32px; color: #ff4444">0</div><div id="r2" style="color: gold; font-size: 12px"></div></div>
    </div>
    <div style="position: relative; display: flex; align-items: center; justify-content: center;">
        <canvas id="game" width="800" height="400"></canvas>
        <div id="msg"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
